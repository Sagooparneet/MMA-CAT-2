<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Save Our Wildlife</h1>
        
        <div class="video-container">
            <video id="wildlifeVideo" controls aria-label="Wildlife conservation promotional video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <p class="description">
            Join us in protecting endangered species and preserving natural habitats for future generations. 
            Every action counts in our mission to save wildlife around the world.
            Credits for the video to Nat Geo Animals.
        </p>
        
        <button id="toggleButton" aria-label="Toggle video playback">Hide Video</button>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
